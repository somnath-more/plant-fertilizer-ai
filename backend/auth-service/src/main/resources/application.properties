spring.application.name=auth-service
server.port=8081
# =====================
# Database Configuration
# =====================
spring.datasource.url=jdbc:mysql://localhost:3306/organic_fertilizer_users?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# H2 Database Configuration (for development/testing)
#spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
#spring.datasource.username=sa
#spring.datasource.password=
#spring.datasource.driver-class-name=org.h2.Driver
# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =====================
# Redis
# =====================
spring.redis.host=localhost
spring.redis.port=6379

# =====================
# Eureka Client
# =====================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.server.enable-self-preservation=false

# Ensure automatic restart is not disabled
spring.devtools.restart.enabled=true
# Ensure LiveReload is enabled (if you use it)
spring.devtools.livereload.enabled=true
# Ensure the correct folders are being watched (default is fine usually)
 spring.devtools.restart.additional-paths=src/main/java

# need to exposed actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info,beans
management.endpoint.health.show-details=always
